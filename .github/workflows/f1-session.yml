name: F1 Session Monitor (2026 Hardcoded Schedule)

# Runs every 10 minutes on F1 weekend days (Thu-Sun) during the season (Mar-Dec).
# No API polling — all 2026 session times are hardcoded from the official F1 calendar.
on:
  schedule:
    # Every 10 minutes on Thursday, Friday, Saturday, Sunday (Mar-Dec)
    # Thursday needed for Las Vegas (sessions Thu evening local = Fri UTC)
    - cron: '*/10 * * 3-12 4'   # Thursday
    - cron: '*/10 * * 3-12 5'   # Friday
    - cron: '*/10 * * 3-12 6'   # Saturday
    - cron: '*/10 * * 3-12 0'   # Sunday
  workflow_dispatch:              # Manual trigger for testing

permissions:
  contents: write

jobs:
  check-f1-session:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check F1 session and update config
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "=== F1 Session Monitor (2026 Hardcoded Schedule) ==="
          NOW_UTC=$(date -u '+%Y-%m-%d %H:%M:%S')
          NOW_EPOCH=$(date -u +%s)
          echo "Current UTC time: $NOW_UTC (epoch: $NOW_EPOCH)"

          # -------------------------------------------------------------------
          # FULL 2026 F1 CALENDAR — ALL SESSION TIMES IN UTC
          # Source: formula1.com official timetables
          #
          # Format: "YYYY-MM-DD HH:MM DURATION_MIN SESSION_TYPE RACE_NAME"
          #   DURATION_MIN = session length in minutes
          #   SESSION_TYPE = PRACTICE|QUALIFYING|SPRINT_QUALIFYING|SPRINT|RACE
          #
          # Sprint weekends: China, Canada, Great Britain, Netherlands, Singapore
          # -------------------------------------------------------------------

          SESSIONS=(
            # ================================================================
            # ROUND 1 — AUSTRALIAN GP (Melbourne, UTC+11)
            # ================================================================
            # FP1: Fri Mar 6, 13:30 local = 02:30 UTC
            "2026-03-06 02:30 60 PRACTICE Australian_GP"
            # FP2: Fri Mar 6, 17:00 local = 06:00 UTC
            "2026-03-06 06:00 60 PRACTICE Australian_GP"
            # FP3: Sat Mar 7, 12:30 local = 01:30 UTC
            "2026-03-07 01:30 60 PRACTICE Australian_GP"
            # Qualifying: Sat Mar 7, 16:00 local = 05:00 UTC
            "2026-03-07 05:00 60 QUALIFYING Australian_GP"
            # Race: Sun Mar 8, 15:00 local = 04:00 UTC
            "2026-03-08 04:00 120 RACE Australian_GP"

            # ================================================================
            # ROUND 2 — CHINESE GP [SPRINT] (Shanghai, UTC+8)
            # ================================================================
            # FP1: Fri Mar 13, 13:30 local = 05:30 UTC
            "2026-03-13 05:30 60 PRACTICE Chinese_GP"
            # Sprint Qualifying: Fri Mar 13, 17:30 local = 09:30 UTC
            "2026-03-13 09:30 44 SPRINT_QUALIFYING Chinese_GP"
            # Sprint: Sat Mar 14, 12:00 local = 04:00 UTC
            "2026-03-14 04:00 30 SPRINT Chinese_GP"
            # Qualifying: Sat Mar 14, 16:00 local = 08:00 UTC
            "2026-03-14 08:00 60 QUALIFYING Chinese_GP"
            # Race: Sun Mar 15, 15:00 local = 07:00 UTC
            "2026-03-15 07:00 120 RACE Chinese_GP"

            # ================================================================
            # ROUND 3 — JAPANESE GP (Suzuka, UTC+9)
            # ================================================================
            # FP1: Fri Mar 27, 13:30 local = 04:30 UTC
            "2026-03-27 04:30 60 PRACTICE Japanese_GP"
            # FP2: Fri Mar 27, 17:00 local = 08:00 UTC
            "2026-03-27 08:00 60 PRACTICE Japanese_GP"
            # FP3: Sat Mar 28, 12:30 local = 03:30 UTC
            "2026-03-28 03:30 60 PRACTICE Japanese_GP"
            # Qualifying: Sat Mar 28, 16:00 local = 07:00 UTC
            "2026-03-28 07:00 60 QUALIFYING Japanese_GP"
            # Race: Sun Mar 29, 15:00 local = 06:00 UTC
            "2026-03-29 06:00 120 RACE Japanese_GP"

            # ================================================================
            # ROUND 4 — MIAMI GP (Miami, UTC-4 EDT)
            # ================================================================
            # FP1: Fri May 1, 13:30 local = 17:30 UTC
            "2026-05-01 17:30 60 PRACTICE Miami_GP"
            # FP2: Fri May 1, 17:00 local = 21:00 UTC
            "2026-05-01 21:00 60 PRACTICE Miami_GP"
            # FP3: Sat May 2, 12:30 local = 16:30 UTC
            "2026-05-02 16:30 60 PRACTICE Miami_GP"
            # Qualifying: Sat May 2, 16:00 local = 20:00 UTC
            "2026-05-02 20:00 60 QUALIFYING Miami_GP"
            # Race: Sun May 3, 15:00 local = 19:00 UTC
            "2026-05-03 19:00 120 RACE Miami_GP"

            # ================================================================
            # ROUND 5 — CANADIAN GP [SPRINT] (Montreal, UTC-4 EDT)
            # ================================================================
            # FP1: Fri May 22, 13:30 local = 17:30 UTC
            "2026-05-22 17:30 60 PRACTICE Canadian_GP"
            # Sprint Qualifying: Fri May 22, 17:30 local = 21:30 UTC
            "2026-05-22 21:30 44 SPRINT_QUALIFYING Canadian_GP"
            # Sprint: Sat May 23, 12:00 local = 16:00 UTC
            "2026-05-23 16:00 30 SPRINT Canadian_GP"
            # Qualifying: Sat May 23, 16:00 local = 20:00 UTC
            "2026-05-23 20:00 60 QUALIFYING Canadian_GP"
            # Race: Sun May 24, 15:00 local = 19:00 UTC
            "2026-05-24 19:00 120 RACE Canadian_GP"

            # ================================================================
            # ROUND 6 — MONACO GP (Monte Carlo, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Jun 5, 13:30 local = 11:30 UTC
            "2026-06-05 11:30 60 PRACTICE Monaco_GP"
            # FP2: Fri Jun 5, 17:00 local = 15:00 UTC
            "2026-06-05 15:00 60 PRACTICE Monaco_GP"
            # FP3: Sat Jun 6, 12:30 local = 10:30 UTC
            "2026-06-06 10:30 60 PRACTICE Monaco_GP"
            # Qualifying: Sat Jun 6, 16:00 local = 14:00 UTC
            "2026-06-06 14:00 60 QUALIFYING Monaco_GP"
            # Race: Sun Jun 7, 15:00 local = 13:00 UTC
            "2026-06-07 13:00 120 RACE Monaco_GP"

            # ================================================================
            # ROUND 7 — BARCELONA-CATALUNYA GP (Barcelona, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Jun 12, 13:30 local = 11:30 UTC
            "2026-06-12 11:30 60 PRACTICE Barcelona-Catalunya_GP"
            # FP2: Fri Jun 12, 17:00 local = 15:00 UTC
            "2026-06-12 15:00 60 PRACTICE Barcelona-Catalunya_GP"
            # FP3: Sat Jun 13, 12:30 local = 10:30 UTC
            "2026-06-13 10:30 60 PRACTICE Barcelona-Catalunya_GP"
            # Qualifying: Sat Jun 13, 16:00 local = 14:00 UTC
            "2026-06-13 14:00 60 QUALIFYING Barcelona-Catalunya_GP"
            # Race: Sun Jun 14, 15:00 local = 13:00 UTC
            "2026-06-14 13:00 120 RACE Barcelona-Catalunya_GP"

            # ================================================================
            # ROUND 8 — AUSTRIAN GP (Spielberg, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Jun 26, 13:30 local = 11:30 UTC
            "2026-06-26 11:30 60 PRACTICE Austrian_GP"
            # FP2: Fri Jun 26, 17:00 local = 15:00 UTC
            "2026-06-26 15:00 60 PRACTICE Austrian_GP"
            # FP3: Sat Jun 27, 12:30 local = 10:30 UTC
            "2026-06-27 10:30 60 PRACTICE Austrian_GP"
            # Qualifying: Sat Jun 27, 16:00 local = 14:00 UTC
            "2026-06-27 14:00 60 QUALIFYING Austrian_GP"
            # Race: Sun Jun 28, 15:00 local = 13:00 UTC
            "2026-06-28 13:00 120 RACE Austrian_GP"

            # ================================================================
            # ROUND 9 — BRITISH GP [SPRINT] (Silverstone, UTC+1 BST)
            # ================================================================
            # FP1: Fri Jul 3, 13:30 local = 12:30 UTC
            "2026-07-03 12:30 60 PRACTICE British_GP"
            # Sprint Qualifying: Fri Jul 3, 17:30 local = 16:30 UTC
            "2026-07-03 16:30 44 SPRINT_QUALIFYING British_GP"
            # Sprint: Sat Jul 4, 12:00 local = 11:00 UTC
            "2026-07-04 11:00 30 SPRINT British_GP"
            # Qualifying: Sat Jul 4, 16:00 local = 15:00 UTC
            "2026-07-04 15:00 60 QUALIFYING British_GP"
            # Race: Sun Jul 5, 15:00 local = 14:00 UTC
            "2026-07-05 14:00 120 RACE British_GP"

            # ================================================================
            # ROUND 10 — BELGIAN GP (Spa, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Jul 17, 13:30 local = 11:30 UTC
            "2026-07-17 11:30 60 PRACTICE Belgian_GP"
            # FP2: Fri Jul 17, 17:00 local = 15:00 UTC
            "2026-07-17 15:00 60 PRACTICE Belgian_GP"
            # FP3: Sat Jul 18, 12:30 local = 10:30 UTC
            "2026-07-18 10:30 60 PRACTICE Belgian_GP"
            # Qualifying: Sat Jul 18, 16:00 local = 14:00 UTC
            "2026-07-18 14:00 60 QUALIFYING Belgian_GP"
            # Race: Sun Jul 19, 15:00 local = 13:00 UTC
            "2026-07-19 13:00 120 RACE Belgian_GP"

            # ================================================================
            # ROUND 11 — HUNGARIAN GP (Budapest, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Jul 24, 13:30 local = 11:30 UTC
            "2026-07-24 11:30 60 PRACTICE Hungarian_GP"
            # FP2: Fri Jul 24, 17:00 local = 15:00 UTC
            "2026-07-24 15:00 60 PRACTICE Hungarian_GP"
            # FP3: Sat Jul 25, 12:30 local = 10:30 UTC
            "2026-07-25 10:30 60 PRACTICE Hungarian_GP"
            # Qualifying: Sat Jul 25, 16:00 local = 14:00 UTC
            "2026-07-25 14:00 60 QUALIFYING Hungarian_GP"
            # Race: Sun Jul 26, 15:00 local = 13:00 UTC
            "2026-07-26 13:00 120 RACE Hungarian_GP"

            # ================================================================
            # ROUND 12 — DUTCH GP [SPRINT] (Zandvoort, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Aug 21, 13:30 local = 11:30 UTC
            "2026-08-21 11:30 60 PRACTICE Dutch_GP"
            # Sprint Qualifying: Fri Aug 21, 17:30 local = 15:30 UTC
            "2026-08-21 15:30 44 SPRINT_QUALIFYING Dutch_GP"
            # Sprint: Sat Aug 22, 12:00 local = 10:00 UTC
            "2026-08-22 10:00 30 SPRINT Dutch_GP"
            # Qualifying: Sat Aug 22, 16:00 local = 14:00 UTC
            "2026-08-22 14:00 60 QUALIFYING Dutch_GP"
            # Race: Sun Aug 23, 15:00 local = 13:00 UTC
            "2026-08-23 13:00 120 RACE Dutch_GP"

            # ================================================================
            # ROUND 13 — ITALIAN GP (Monza, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Sep 4, 13:30 local = 11:30 UTC
            "2026-09-04 11:30 60 PRACTICE Italian_GP"
            # FP2: Fri Sep 4, 17:00 local = 15:00 UTC
            "2026-09-04 15:00 60 PRACTICE Italian_GP"
            # FP3: Sat Sep 5, 12:30 local = 10:30 UTC
            "2026-09-05 10:30 60 PRACTICE Italian_GP"
            # Qualifying: Sat Sep 5, 16:00 local = 14:00 UTC
            "2026-09-05 14:00 60 QUALIFYING Italian_GP"
            # Race: Sun Sep 6, 15:00 local = 13:00 UTC
            "2026-09-06 13:00 120 RACE Italian_GP"

            # ================================================================
            # ROUND 14 — SPANISH GP (Madrid, UTC+2 CEST)
            # ================================================================
            # FP1: Fri Sep 11, 13:30 local = 11:30 UTC
            "2026-09-11 11:30 60 PRACTICE Spanish_GP"
            # FP2: Fri Sep 11, 17:00 local = 15:00 UTC
            "2026-09-11 15:00 60 PRACTICE Spanish_GP"
            # FP3: Sat Sep 12, 12:30 local = 10:30 UTC
            "2026-09-12 10:30 60 PRACTICE Spanish_GP"
            # Qualifying: Sat Sep 12, 16:00 local = 14:00 UTC
            "2026-09-12 14:00 60 QUALIFYING Spanish_GP"
            # Race: Sun Sep 13, 15:00 local = 13:00 UTC
            "2026-09-13 13:00 120 RACE Spanish_GP"

            # ================================================================
            # ROUND 15 — AZERBAIJAN GP (Baku, UTC+4)
            # ================================================================
            # FP1: Fri Sep 25, 13:30 local = 09:30 UTC
            "2026-09-25 09:30 60 PRACTICE Azerbaijan_GP"
            # FP2: Fri Sep 25, 17:00 local = 13:00 UTC
            "2026-09-25 13:00 60 PRACTICE Azerbaijan_GP"
            # FP3: Sat Sep 26, 12:30 local = 08:30 UTC
            "2026-09-26 08:30 60 PRACTICE Azerbaijan_GP"
            # Qualifying: Sat Sep 26, 16:00 local = 12:00 UTC
            "2026-09-26 12:00 60 QUALIFYING Azerbaijan_GP"
            # Race: Sun Sep 27, 15:00 local = 11:00 UTC
            "2026-09-27 11:00 120 RACE Azerbaijan_GP"

            # ================================================================
            # ROUND 16 — SINGAPORE GP [SPRINT] (Marina Bay, UTC+8)
            # ================================================================
            # FP1: Fri Oct 9, 13:30 local = 05:30 UTC
            "2026-10-09 05:30 60 PRACTICE Singapore_GP"
            # Sprint Qualifying: Fri Oct 9, 17:30 local = 09:30 UTC
            "2026-10-09 09:30 44 SPRINT_QUALIFYING Singapore_GP"
            # Sprint: Sat Oct 10, 12:00 local = 04:00 UTC
            "2026-10-10 04:00 30 SPRINT Singapore_GP"
            # Qualifying: Sat Oct 10, 16:00 local = 08:00 UTC
            "2026-10-10 08:00 60 QUALIFYING Singapore_GP"
            # Race: Sun Oct 11, 15:00 local = 07:00 UTC
            "2026-10-11 07:00 120 RACE Singapore_GP"

            # ================================================================
            # ROUND 17 — UNITED STATES GP (Austin, UTC-5 CDT)
            # ================================================================
            # FP1: Fri Oct 23, 13:30 local = 18:30 UTC
            "2026-10-23 18:30 60 PRACTICE United_States_GP"
            # FP2: Fri Oct 23, 17:00 local = 22:00 UTC
            "2026-10-23 22:00 60 PRACTICE United_States_GP"
            # FP3: Sat Oct 24, 12:30 local = 17:30 UTC
            "2026-10-24 17:30 60 PRACTICE United_States_GP"
            # Qualifying: Sat Oct 24, 16:00 local = 21:00 UTC
            "2026-10-24 21:00 60 QUALIFYING United_States_GP"
            # Race: Sun Oct 25, 15:00 local = 20:00 UTC
            "2026-10-25 20:00 120 RACE United_States_GP"

            # ================================================================
            # ROUND 18 — MEXICO CITY GP (Mexico City, UTC-6 CST)
            # ================================================================
            # FP1: Fri Oct 30, 13:30 local = 19:30 UTC
            "2026-10-30 19:30 60 PRACTICE Mexico_City_GP"
            # FP2: Fri Oct 30, 17:00 local = 23:00 UTC
            "2026-10-30 23:00 60 PRACTICE Mexico_City_GP"
            # FP3: Sat Oct 31, 12:30 local = 18:30 UTC
            "2026-10-31 18:30 60 PRACTICE Mexico_City_GP"
            # Qualifying: Sat Oct 31, 16:00 local = 22:00 UTC
            "2026-10-31 22:00 60 QUALIFYING Mexico_City_GP"
            # Race: Sun Nov 1, 15:00 local = 21:00 UTC
            "2026-11-01 21:00 120 RACE Mexico_City_GP"

            # ================================================================
            # ROUND 19 — LAS VEGAS GP (Las Vegas, UTC-8 PST)
            # Sessions run Thu/Fri/Sat local time
            # ================================================================
            # FP1: Thu Nov 19, 18:30 local = 02:30 UTC (Fri Nov 20)
            "2026-11-20 02:30 60 PRACTICE Las_Vegas_GP"
            # FP2: Thu Nov 19, 22:00 local = 06:00 UTC (Fri Nov 20)
            "2026-11-20 06:00 60 PRACTICE Las_Vegas_GP"
            # FP3: Fri Nov 20, 18:30 local = 02:30 UTC (Sat Nov 21)
            "2026-11-21 02:30 60 PRACTICE Las_Vegas_GP"
            # Qualifying: Fri Nov 20, 22:00 local = 06:00 UTC (Sat Nov 21)
            "2026-11-21 06:00 60 QUALIFYING Las_Vegas_GP"
            # Race: Sat Nov 21, 22:00 local = 06:00 UTC (Sun Nov 22)
            "2026-11-22 06:00 120 RACE Las_Vegas_GP"

            # ================================================================
            # ROUND 20 — QATAR GP (Lusail, UTC+3)
            # ================================================================
            # FP1: Fri Nov 27, 13:30 local = 10:30 UTC
            "2026-11-27 10:30 60 PRACTICE Qatar_GP"
            # FP2: Fri Nov 27, 17:00 local = 14:00 UTC
            "2026-11-27 14:00 60 PRACTICE Qatar_GP"
            # FP3: Sat Nov 28, 12:30 local = 09:30 UTC
            "2026-11-28 09:30 60 PRACTICE Qatar_GP"
            # Qualifying: Sat Nov 28, 16:00 local = 13:00 UTC
            "2026-11-28 13:00 60 QUALIFYING Qatar_GP"
            # Race: Sun Nov 29, 15:00 local = 12:00 UTC
            "2026-11-29 12:00 120 RACE Qatar_GP"

            # ================================================================
            # ROUND 21 — ABU DHABI GP (Yas Marina, UTC+4)
            # ================================================================
            # FP1: Fri Dec 4, 13:30 local = 09:30 UTC
            "2026-12-04 09:30 60 PRACTICE Abu_Dhabi_GP"
            # FP2: Fri Dec 4, 17:00 local = 13:00 UTC
            "2026-12-04 13:00 60 PRACTICE Abu_Dhabi_GP"
            # FP3: Sat Dec 5, 12:30 local = 08:30 UTC
            "2026-12-05 08:30 60 PRACTICE Abu_Dhabi_GP"
            # Qualifying: Sat Dec 5, 16:00 local = 12:00 UTC
            "2026-12-05 12:00 60 QUALIFYING Abu_Dhabi_GP"
            # Race: Sun Dec 6, 15:00 local = 11:00 UTC
            "2026-12-06 11:00 120 RACE Abu_Dhabi_GP"
          )

          # -------------------------------------------------------------------
          # Check if current time falls within any session window
          # Window: 5 minutes before session start to 5 minutes after session end
          # -------------------------------------------------------------------
          LEAD_TIME=300    # 5 minutes before start
          TRAIL_TIME=300   # 5 minutes after end

          SESSION_ACTIVE=false
          SESSION_TYPE=""
          RACE_NAME=""

          echo ""
          echo "--- Scanning ${#SESSIONS[@]} hardcoded sessions ---"

          for entry in "${SESSIONS[@]}"; do
            # Parse fields
            S_DATE=$(echo "$entry" | awk '{print $1}')
            S_TIME=$(echo "$entry" | awk '{print $2}')
            S_DUR=$(echo "$entry" | awk '{print $3}')
            S_TYPE=$(echo "$entry" | awk '{print $4}')
            S_RACE=$(echo "$entry" | awk '{print $5}')

            # Convert session start to epoch
            S_EPOCH=$(date -u -d "${S_DATE} ${S_TIME}:00" +%s 2>/dev/null || echo "0")
            if [ "$S_EPOCH" = "0" ]; then
              continue
            fi

            # Calculate window
            WINDOW_OPEN=$((S_EPOCH - LEAD_TIME))
            WINDOW_CLOSE=$((S_EPOCH + S_DUR * 60 + TRAIL_TIME))

            # Only check sessions within +/- 24 hours of now (performance optimisation)
            DIFF=$((NOW_EPOCH - S_EPOCH))
            if [ "$DIFF" -gt 86400 ] || [ "$DIFF" -lt -86400 ]; then
              continue
            fi

            # Check if we're in the window
            if [ "$NOW_EPOCH" -ge "$WINDOW_OPEN" ] && [ "$NOW_EPOCH" -le "$WINDOW_CLOSE" ]; then
              echo "  >>> ACTIVE: $S_TYPE at $S_RACE ($S_DATE $S_TIME UTC, ${S_DUR}min)"
              SESSION_ACTIVE=true
              SESSION_TYPE="$S_TYPE"
              RACE_NAME="$S_RACE"
              break
            fi
          done

          if [ "$SESSION_ACTIVE" = "false" ]; then
            echo "  No active session found."
          fi

          echo ""
          echo "Result: f1_session_active=$SESSION_ACTIVE, f1_session_type=$SESSION_TYPE"

          # -------------------------------------------------------------------
          # Update config.json — preserve all existing fields using jq
          # -------------------------------------------------------------------
          CONFIG_FILE="config.json"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: $CONFIG_FILE not found in repo root. Cannot update."
            exit 1
          fi

          # Read current values
          CURRENT_ACTIVE=$(jq -r '.f1_session_active // false' "$CONFIG_FILE")
          CURRENT_TYPE=$(jq -r '.f1_session_type // ""' "$CONFIG_FILE")

          echo ""
          echo "--- Config comparison ---"
          echo "  Current: active=$CURRENT_ACTIVE type=\"$CURRENT_TYPE\""
          echo "  New:     active=$SESSION_ACTIVE type=\"$SESSION_TYPE\""

          # Normalise for comparison
          if [ "$SESSION_ACTIVE" = "true" ]; then
            NEW_ACTIVE_JSON="true"
          else
            NEW_ACTIVE_JSON="false"
          fi

          # Only commit if values actually changed
          if [ "$CURRENT_ACTIVE" = "$NEW_ACTIVE_JSON" ] && [ "$CURRENT_TYPE" = "$SESSION_TYPE" ]; then
            echo ""
            echo "No change detected. Skipping commit."
            exit 0
          fi

          # Update JSON, preserving all other fields
          jq --argjson active "$NEW_ACTIVE_JSON" \
             --arg stype "$SESSION_TYPE" \
             '.f1_session_active = $active | .f1_session_type = $stype' \
             "$CONFIG_FILE" > tmp_config.json && mv tmp_config.json "$CONFIG_FILE"

          echo ""
          echo "Updated $CONFIG_FILE:"
          jq '{f1_session_active, f1_session_type}' "$CONFIG_FILE"

          # -------------------------------------------------------------------
          # Commit and push
          # -------------------------------------------------------------------
          git config user.name "F1 Session Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$CONFIG_FILE"

          if [ "$SESSION_ACTIVE" = "true" ]; then
            COMMIT_MSG="f1: activate session — ${SESSION_TYPE} (${RACE_NAME//_/ })"
          else
            COMMIT_MSG="f1: deactivate session"
          fi

          git commit -m "$COMMIT_MSG"
          git push

          echo ""
          echo "Committed: $COMMIT_MSG"

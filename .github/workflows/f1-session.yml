            "2025-11-07 18:30 44 SPRINT_QUALIFYING Sao_Paulo_GP"
            # Sprint: Sat Nov 8, 11:00 local = 14:00 UTC
            "2025-11-08 14:00 30 SPRINT Sao_Paulo_GP"
            # Qualifying: Sat Nov 8, 15:00 local = 18:00 UTC
            "2025-11-08 18:00 60 QUALIFYING Sao_Paulo_GP"
            # Race: Sun Nov 9, 14:00 local = 17:00 UTC
            "2025-11-09 17:00 120 RACE Sao_Paulo_GP"

            # ================================================================
            # ROUND 22 — LAS VEGAS GP (Las Vegas, UTC-8 PST)
            # ================================================================

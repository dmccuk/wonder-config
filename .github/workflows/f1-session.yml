            # ROUND 24 — ABU DHABI GP (Yas Marina, UTC+4)
            # ================================================================
            # FP1: Fri Dec 5, 13:30 local = 09:30 UTC
            "2025-12-05 09:30 60 PRACTICE Abu_Dhabi_GP"
            # FP2: Fri Dec 5, 17:00 local = 13:00 UTC
            "2025-12-05 13:00 60 PRACTICE Abu_Dhabi_GP"
            # FP3: Sat Dec 6, 14:30 local = 10:30 UTC
            "2025-12-06 10:30 60 PRACTICE Abu_Dhabi_GP"
            # Qualifying: Sat Dec 6, 18:00 local = 14:00 UTC
            "2025-12-06 14:00 60 QUALIFYING Abu_Dhabi_GP"
            # Race: Sun Dec 7, 17:00 local = 13:00 UTC
            "2025-12-07 13:00 120 RACE Abu_Dhabi_GP"
          )

          # -------------------------------------------------------------------
          # Check if current time falls within any session window
          # Window: 5 minutes before session start to 5 minutes after session end
          # -------------------------------------------------------------------
          LEAD_TIME=300    # 5 minutes before start
          TRAIL_TIME=300   # 5 minutes after end

          SESSION_ACTIVE=false
          SESSION_TYPE=""
          RACE_NAME=""

          echo ""
          echo "--- Scanning ${#SESSIONS[@]} hardcoded sessions ---"

          for entry in "${SESSIONS[@]}"; do
            # Parse fields
            S_DATE=$(echo "$entry" | awk '{print $1}')
            S_TIME=$(echo "$entry" | awk '{print $2}')
            S_DUR=$(echo "$entry" | awk '{print $3}')
            S_TYPE=$(echo "$entry" | awk '{print $4}')
            S_RACE=$(echo "$entry" | awk '{print $5}')

            # Convert session start to epoch
            S_EPOCH=$(date -u -d "${S_DATE} ${S_TIME}:00" +%s 2>/dev/null || echo "0")
            if [ "$S_EPOCH" = "0" ]; then
              continue
            fi

            # Calculate window
            WINDOW_OPEN=$((S_EPOCH - LEAD_TIME))
            WINDOW_CLOSE=$((S_EPOCH + S_DUR * 60 + TRAIL_TIME))

            # Only check sessions within +/- 24 hours of now (performance optimisation)
            DIFF=$((NOW_EPOCH - S_EPOCH))
            if [ "$DIFF" -gt 86400 ] || [ "$DIFF" -lt -86400 ]; then
              continue
            fi

            # Check if we're in the window
            if [ "$NOW_EPOCH" -ge "$WINDOW_OPEN" ] && [ "$NOW_EPOCH" -le "$WINDOW_CLOSE" ]; then
              echo "  >>> ACTIVE: $S_TYPE at $S_RACE ($S_DATE $S_TIME UTC, ${S_DUR}min)"
              SESSION_ACTIVE=true
              SESSION_TYPE="$S_TYPE"
              RACE_NAME="$S_RACE"
              break
            fi
          done

          if [ "$SESSION_ACTIVE" = "false" ]; then
            echo "  No active session found."
          fi

          echo ""
          echo "Result: f1_session_active=$SESSION_ACTIVE, f1_session_type=$SESSION_TYPE"

          # -------------------------------------------------------------------
          # Update config.json — preserve all existing fields using jq
          # -------------------------------------------------------------------
          CONFIG_FILE="config.json"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: $CONFIG_FILE not found in repo root. Cannot update."
            exit 1
          fi

          # Read current values
          CURRENT_ACTIVE=$(jq -r '.f1_session_active // false' "$CONFIG_FILE")
          CURRENT_TYPE=$(jq -r '.f1_session_type // ""' "$CONFIG_FILE")

          echo ""
          echo "--- Config comparison ---"
          echo "  Current: active=$CURRENT_ACTIVE type=\"$CURRENT_TYPE\""
          echo "  New:     active=$SESSION_ACTIVE type=\"$SESSION_TYPE\""

          # Normalise for comparison
          if [ "$SESSION_ACTIVE" = "true" ]; then
            NEW_ACTIVE_JSON="true"
          else
            NEW_ACTIVE_JSON="false"
          fi

          # Only commit if values actually changed
          if [ "$CURRENT_ACTIVE" = "$NEW_ACTIVE_JSON" ] && [ "$CURRENT_TYPE" = "$SESSION_TYPE" ]; then
            echo ""
            echo "No change detected. Skipping commit."
            exit 0
          fi

          # Update JSON, preserving all other fields
          jq --argjson active "$NEW_ACTIVE_JSON" \
             --arg stype "$SESSION_TYPE" \
             '.f1_session_active = $active | .f1_session_type = $stype' \
             "$CONFIG_FILE" > tmp_config.json && mv tmp_config.json "$CONFIG_FILE"

          echo ""
          echo "Updated $CONFIG_FILE:"
          jq '{f1_session_active, f1_session_type}' "$CONFIG_FILE"

          # -------------------------------------------------------------------
          # Commit and push
          # -------------------------------------------------------------------
          git config user.name "F1 Session Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$CONFIG_FILE"

          if [ "$SESSION_ACTIVE" = "true" ]; then
            COMMIT_MSG="f1: activate session — ${SESSION_TYPE} (${RACE_NAME//_/ })"
          else
            COMMIT_MSG="f1: deactivate session"
          fi

          git commit -m "$COMMIT_MSG"
          git push

          echo ""
          echo "Committed: $COMMIT_MSG"

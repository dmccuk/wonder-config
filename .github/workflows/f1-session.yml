name: F1 Session Monitor (2025 Hardcoded Schedule)

# Runs every 10 minutes on F1 weekend days (Thu-Sun) during the season (Mar-Dec).
# No API polling — all 2025 session times are hardcoded from the official F1 calendar.
on:
  schedule:
    # Every 10 minutes on Thursday, Friday, Saturday, Sunday (Mar-Dec)
    # Thursday needed for Las Vegas (sessions Thu evening local = Fri UTC)
    - cron: '*/10 * * 3-12 4'   # Thursday
    - cron: '*/10 * * 3-12 5'   # Friday
    - cron: '*/10 * * 3-12 6'   # Saturday
    - cron: '*/10 * * 3-12 0'   # Sunday
  workflow_dispatch:              # Manual trigger for testing

permissions:
  contents: write

jobs:
  check-f1-session:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check F1 session and update config
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "=== F1 Session Monitor (2025 Hardcoded Schedule) ==="
          NOW_UTC=$(date -u '+%Y-%m-%d %H:%M:%S')
          NOW_EPOCH=$(date -u +%s)
          echo "Current UTC time: $NOW_UTC (epoch: $NOW_EPOCH)"

          # -------------------------------------------------------------------
          # FULL 2025 F1 CALENDAR — ALL SESSION TIMES IN UTC
          # Source: formula1.com official timetables

            # FP2: Fri Mar 14, 16:00 local = 05:00 UTC
            "2025-03-14 05:00 60 PRACTICE Australian_GP"
            # FP3: Sat Mar 15, 12:30 local = 01:30 UTC
            "2025-03-15 01:30 60 PRACTICE Australian_GP"
            # Qualifying: Sat Mar 15, 16:00 local = 05:00 UTC
            "2025-03-15 05:00 60 QUALIFYING Australian_GP"
            # Race: Sun Mar 16, 15:00 local = 04:00 UTC
            "2025-03-16 04:00 120 RACE Australian_GP"

            # ================================================================

            # Sprint: Sat Mar 22, 11:00 local = 03:00 UTC
            "2025-03-22 03:00 30 SPRINT Chinese_GP"
            # Qualifying: Sat Mar 22, 15:00 local = 07:00 UTC
            "2025-03-22 07:00 60 QUALIFYING Chinese_GP"
            # Race: Sun Mar 23, 15:00 local = 07:00 UTC
